<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mentoría Inglés en 90 Horas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050608;--surface:#0c0d11;--surface2:#111318;
  --border:rgba(255,255,255,0.05);--text:#d8dce8;--muted:#4a5060;
  --accent:#00c988;--accent2:#6a5fd6;--accent3:#d4901f;--danger:#e04444;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(0,229,160,.5);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.brand-name{font-size:15px;font-weight:800;}
.brand-campaign{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:11px;font-family:var(--mono);color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.status-pill.ok{color:var(--accent);border-color:rgba(0,229,160,.25);}
.status-pill.ok .status-dot{background:var(--accent);box-shadow:0 0 6px rgba(0,229,160,.6);}
.status-pill.err{color:var(--danger);border-color:rgba(255,92,92,.25);}
.status-pill.err .status-dot{background:var(--danger);}
.btn{padding:7px 16px;border-radius:7px;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-accent{background:var(--accent);color:#0d0f14;}
.btn-accent:hover{filter:brightness(.88);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.main{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem;}
.loading-state{text-align:center;padding:5rem 2rem;}
.loading-icon{font-size:36px;margin-bottom:1rem;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.loading-txt{font-size:13px;color:var(--muted);font-family:var(--mono);}
.error-state{text-align:center;padding:4rem 2rem;border:1px dashed rgba(255,92,92,.3);border-radius:14px;margin-top:1rem;}
.error-icon{font-size:36px;margin-bottom:1rem;}
.error-title{font-size:16px;font-weight:700;color:var(--danger);margin-bottom:.5rem;}
.error-sub{font-size:12px;color:var(--muted);font-family:var(--mono);}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr);}}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;position:relative;overflow:hidden;}
.mcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mcard.c1::after{background:linear-gradient(90deg,var(--accent),transparent);}
.mcard.c2::after{background:linear-gradient(90deg,var(--accent2),transparent);}
.mcard.c3::after{background:linear-gradient(90deg,var(--accent3),transparent);}
.mcard.c4::after{background:linear-gradient(90deg,var(--danger),transparent);}
.mcard-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.5rem;}
.mcard-val{font-size:28px;font-weight:800;line-height:1;}
.mcard-delta{font-size:11px;margin-top:.4rem;font-family:var(--mono);color:var(--muted);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1rem;}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.1rem;}
.chart-title{font-size:14px;font-weight:700;}
.chart-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted);font-family:var(--mono);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-sq{width:10px;height:10px;border-radius:2px;}
.section-label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:.8rem;margin-top:.5rem;}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.9rem;}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;transition:border-color .2s;}
.gcard:hover{border-color:rgba(255,255,255,.14);}
.gcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.gcard-name{font-size:13px;font-weight:700;line-height:1.2;}
.gcard-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;white-space:nowrap;}
.badge-ok{background:rgba(0,229,160,.1);color:var(--accent);}
.badge-warn{background:rgba(245,166,35,.1);color:var(--accent3);}
.badge-full{background:rgba(255,92,92,.12);color:var(--danger);}
.gcard-numbers{display:flex;gap:1rem;margin-bottom:.8rem;}
.gcard-num label{font-size:10px;color:var(--muted);font-family:var(--mono);display:block;margin-bottom:2px;}
.gcard-num span{font-size:20px;font-weight:800;}
.gcard-bar-track{background:var(--surface2);border-radius:20px;height:5px;}
.gcard-bar-fill{height:5px;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.gcard-pct{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px;}
.footer{text-align:right;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1.2rem;opacity:.6;}
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:inline-block;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-val{height:32px;width:80px;}
.skel-delta{height:12px;width:120px;margin-top:6px;}
.skel-chart{width:100%;height:220px;border-radius:8px;}
.skel-card{height:130px;border-radius:12px;width:100%;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">SendFlow Dashboard</div>
      <div class="brand-campaign" id="lbl-campaign">carregando...</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-txt">conectando...</span>
    </div>
    <button class="btn btn-accent" id="btn-refresh" onclick="loadData()" disabled>↻ atualizar</button>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const COLORS = ['#00e5a0','#7c6ff7','#f5a623','#ff5c5c','#38bdf8','#fb7185','#a3e635','#e879f9'];
let chartAnalytics = null, chartGrupos = null;

function setStatus(cls, txt){
  const p = document.getElementById('status-pill');
  p.className = 'status-pill' + (cls ? ' ' + cls : '');
  document.getElementById('status-txt').textContent = txt;
}
function showLoading(){
  document.getElementById('main').innerHTML = `
    <div class="loading-state">
      <div class="loading-icon">📡</div>
      <div class="loading-txt">buscando dados da campanha...</div>
    </div>`;
}
function showError(msg){
  setStatus('err','erro');
  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Não foi possível carregar os dados</div>
      <div class="error-sub">${msg}</div>
    </div>`;
  document.getElementById('btn-refresh').disabled = false;
}

async function loadData(){
  document.getElementById('btn-refresh').disabled = true;
  setStatus('','atualizando...');
  if(!document.getElementById('db-shell')) showLoading();
  try {
    const res = await fetch('/api/data');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const { campaign, groups, analytics } = await res.json();
    renderDashboard(campaign, groups, analytics);
    setStatus('ok','atualizado');
  } catch(e) {
    showError('Verifique se a variável SENDFLOW_API_KEY está configurada no Vercel.');
    console.error(e);
  } finally {
    document.getElementById('btn-refresh').disabled = false;
  }
}

function renderDashboard(campaign, groups, analytics){
  const campName = campaign?.name || 'Campanha SendFlow';
  document.getElementById('lbl-campaign').textContent = campName;
  const limit = campaign?.group?.limit || 256;
  const total = groups.reduce((s,g) => s + (g.participantsAmount||0), 0);
  const full  = groups.filter(g => g.full).length;
  const media = groups.length ? Math.round(total / groups.length) : 0;
  let novosHoje = 0;
  if(analytics?.add?.dates){
    const dates = Object.entries(analytics.add.dates).sort((a,b) => a[0].localeCompare(b[0]));
    if(dates.length) novosHoje = dates[dates.length-1][1];
  }
  ensureShell();
  document.getElementById('m-total').textContent  = fmtN(total);
  document.getElementById('m-grupos').textContent = groups.length;
  document.getElementById('m-hoje').textContent   = '+' + fmtN(novosHoje);
  document.getElementById('m-media').textContent  = fmtN(media);
  document.getElementById('m-total-d').textContent  = analytics?.add?.total ? fmtN(analytics.add.total) + ' entradas no total' : '';
  document.getElementById('m-grupos-d').textContent = full + ' grupo(s) cheio(s)';
  document.getElementById('m-hoje-d').textContent   = 'novos membros hoje';
  document.getElementById('m-media-d').textContent  = 'membros por grupo';
  // Mostrar canvases e esconder skeletons
  ['chart-analytics','chart-grupos'].forEach(id => {
    const skel = document.getElementById(id+'-skel');
    const canvas = document.getElementById(id);
    if(skel) skel.style.display='none';
    if(canvas) canvas.style.display='block';
  });
  if(analytics) renderAnalyticsChart(analytics);
  else document.getElementById('chart-analytics-wrap').style.display = 'none';
  renderGruposChart(groups);
  renderGroupCards(groups, limit);
  document.getElementById('footer-ts').textContent = 'última atualização: ' + new Date().toLocaleString('pt-BR');
}

function ensureShell(){
  if(document.getElementById('db-shell')) return;
  document.getElementById('main').innerHTML = `
  <div id="db-shell">
    <div class="metrics">
      <div class="mcard c1"><div class="mcard-label">total de membros</div><div class="mcard-val" id="m-total"><span class="skel skel-val"></span></div><div class="mcard-delta" id="m-total-d"><span class="skel skel-delta"></span></div></div>
      <div class="mcard c2"><div class="mcard-label">grupos ativos</div><div class="mcard-val" id="m-grupos"><span class="skel skel-val"></span></div><div class="mcard-delta" id="m-grupos-d"><span class="skel skel-delta"></span></div></div>
      <div class="mcard c3"><div class="mcard-label">novos hoje</div><div class="mcard-val" id="m-hoje"><span class="skel skel-val"></span></div><div class="mcard-delta" id="m-hoje-d"><span class="skel skel-delta"></span></div></div>
      <div class="mcard c4"><div class="mcard-label">média por grupo</div><div class="mcard-val" id="m-media"><span class="skel skel-val"></span></div><div class="mcard-delta" id="m-media-d"><span class="skel skel-delta"></span></div></div>
    </div>
    <div id="chart-analytics-wrap" class="chart-card">
      <div class="chart-header">
        <div><div class="chart-title">Entradas e saídas diárias</div><div class="chart-sub">evolução de membros por dia</div></div>
        <div class="legend" id="leg-analytics"></div>
      </div>
      <div style="position:relative;height:220px;"><span class="skel skel-chart" id="chart-analytics-skel"></span><canvas id="chart-analytics" style="display:none"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-header"><div><div class="chart-title">Membros por grupo</div><div class="chart-sub">quantidade atual de participantes</div></div></div>
      <div style="position:relative;height:220px;"><span class="skel skel-chart" id="chart-grupos-skel"></span><canvas id="chart-grupos" style="display:none"></canvas></div>
    </div>
    <div class="section-label">detalhes por grupo</div>
    <div class="group-grid" id="group-grid">${Array(8).fill('<div class="gcard"><span class="skel skel-card"></span></div>').join('')}</div>
    <div class="footer" id="footer-ts"></div>
  </div>`;
}

function renderAnalyticsChart(analytics){
  const wrap = document.getElementById('chart-analytics-wrap');
  const allDates = new Set([...Object.keys(analytics.add?.dates||{}),...Object.keys(analytics.remove?.dates||{})]);
  const sorted = [...allDates].sort();
  if(!sorted.length){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  const labels  = sorted.map(d => `${d.slice(0,2)}/${d.slice(2,4)}`);
  const adds    = sorted.map(d => analytics.add?.dates?.[d]    || 0);
  const removes = sorted.map(d => analytics.remove?.dates?.[d] || 0);
  if(chartAnalytics) chartAnalytics.destroy();
  chartAnalytics = new Chart(document.getElementById('chart-analytics'),{
    type:'bar',
    data:{labels, datasets:[
      {label:'Entradas', data:adds,    backgroundColor:'rgba(0,229,160,.7)', borderRadius:4},
      {label:'Saídas',   data:removes, backgroundColor:'rgba(255,92,92,.5)', borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#5f6472',font:{family:'DM Mono',size:11}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#5f6472',font:{family:'DM Mono',size:11},callback:v=>fmtN(v)},grid:{color:'rgba(255,255,255,.04)'}}
      }}
  });
  document.getElementById('leg-analytics').innerHTML =
    `<span class="legend-item"><span class="legend-sq" style="background:#00e5a0"></span>entradas</span>
     <span class="legend-item"><span class="legend-sq" style="background:#ff5c5c"></span>saídas</span>`;
}

function renderGruposChart(groups){
  if(chartGrupos) chartGrupos.destroy();
  if(!groups.length) return;
  chartGrupos = new Chart(document.getElementById('chart-grupos'),{
    type:'bar',
    data:{
      labels: groups.map(g => g.name),
      datasets:[{
        label:'Membros', data:groups.map(g=>g.participantsAmount||0),
        backgroundColor:groups.map((_,i)=>COLORS[i%COLORS.length]+'bb'),
        borderColor:groups.map((_,i)=>COLORS[i%COLORS.length]),
        borderWidth:1, borderRadius:5,
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#5f6472',font:{family:'DM Mono',size:11},callback:v=>fmtN(v)},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#eef0f7',font:{family:'DM Mono',size:11}},grid:{display:false}}
      }}
  });
}

function renderGroupCards(groups, limit){
  const sorted = [...groups].sort((a,b) => (a.count||0) - (b.count||0));
  document.getElementById('group-grid').innerHTML = sorted.map((g,i) => {
    const members = g.participantsAmount || 0;
    const cap = limit || 256;
    const pct = Math.min(100, Math.round(members / cap * 100));
    const color = COLORS[i % COLORS.length];
    let badgeCls, badgeTxt;
    if(g.full||pct>=100){ badgeCls='badge-full'; badgeTxt='lotado'; }
    else if(pct>=90){ badgeCls='badge-warn'; badgeTxt='quase cheio'; }
    else { badgeCls='badge-ok'; badgeTxt='ativo'; }
    return `<div class="gcard">
      <div class="gcard-top"><div class="gcard-name">${esc(g.name)}</div><span class="gcard-badge ${badgeCls}">${badgeTxt}</span></div>
      <div class="gcard-numbers">
        <div class="gcard-num"><label>membros</label><span style="color:${color}">${fmtN(members)}</span></div>
        <div class="gcard-num"><label>capacidade</label><span>${fmtN(cap)}</span></div>
        <div class="gcard-num"><label>grupo nº</label><span>${g.count||i+1}</span></div>
      </div>
      <div class="gcard-bar-track"><div class="gcard-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="gcard-pct">${pct}% da capacidade utilizada</div>
    </div>`;
  }).join('');
}

function fmtN(n){ return Number(n).toLocaleString('pt-BR'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
</script>
</body>
</html>
