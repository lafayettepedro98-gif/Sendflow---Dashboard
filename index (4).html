<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mentoría Inglés en 90 Horas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050608;--surface:#0c0d11;--surface2:#111318;
  --border:rgba(255,255,255,0.05);--text:#d8dce8;--muted:#4a5060;
  --accent:#00c988;--accent2:#6a5fd6;--accent3:#d4901f;--danger:#e04444;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(0,201,136,.5);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.brand-name{font-size:15px;font-weight:800;}
.brand-campaign{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:11px;font-family:var(--mono);color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.status-pill.ok{color:var(--accent);border-color:rgba(0,201,136,.25);}
.status-pill.ok .status-dot{background:var(--accent);}
.status-pill.err{color:var(--danger);border-color:rgba(224,68,68,.25);}
.status-pill.err .status-dot{background:var(--danger);}
.btn{padding:7px 16px;border-radius:7px;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-accent{background:var(--accent);color:#050608;}
.btn-accent:hover{filter:brightness(.88);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* TABS */
.tabs-nav{display:flex;gap:4px;padding:.8rem 2rem 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab-btn{padding:.55rem 1.1rem;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;border-bottom:2px solid transparent;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,201,136,.06);}

.main{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.loading-state{text-align:center;padding:5rem 2rem;}
.loading-icon{font-size:36px;margin-bottom:1rem;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.loading-txt{font-size:13px;color:var(--muted);font-family:var(--mono);}
.error-state{text-align:center;padding:4rem 2rem;border:1px dashed rgba(224,68,68,.3);border-radius:14px;margin-top:1rem;}
.error-icon{font-size:36px;margin-bottom:1rem;}
.error-title{font-size:16px;font-weight:700;color:var(--danger);margin-bottom:.5rem;}
.error-sub{font-size:12px;color:var(--muted);font-family:var(--mono);}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr);}}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;position:relative;overflow:hidden;}
.mcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mcard.c1::after{background:linear-gradient(90deg,var(--accent),transparent);}
.mcard.c2::after{background:linear-gradient(90deg,var(--accent2),transparent);}
.mcard.c3::after{background:linear-gradient(90deg,var(--accent3),transparent);}
.mcard.c4::after{background:linear-gradient(90deg,var(--danger),transparent);}
.mcard-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.5rem;}
.mcard-val{font-size:28px;font-weight:800;line-height:1;}
.mcard-delta{font-size:11px;margin-top:.4rem;font-family:var(--mono);color:var(--muted);}

/* CHART */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1rem;}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.1rem;}
.chart-title{font-size:14px;font-weight:700;}
.chart-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted);font-family:var(--mono);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-sq{width:10px;height:10px;border-radius:2px;}

/* GROUP CARDS */
.section-label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:.8rem;margin-top:.5rem;}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;transition:border-color .2s,transform .15s;}
.gcard:hover{border-color:var(--accent);transform:translateY(-2px);}
.gcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.gcard-name{font-size:12px;font-weight:700;line-height:1.3;}
.gcard-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-ok{background:rgba(0,201,136,.1);color:var(--accent);}
.badge-warn{background:rgba(212,144,31,.1);color:var(--accent3);}
.badge-full{background:rgba(224,68,68,.12);color:var(--danger);}
.gcard-numbers{display:flex;gap:1rem;margin-bottom:.8rem;}
.gcard-num label{font-size:10px;color:var(--muted);font-family:var(--mono);display:block;margin-bottom:2px;}
.gcard-num span{font-size:18px;font-weight:800;}
.gcard-bar-track{background:var(--surface2);border-radius:20px;height:4px;}
.gcard-bar-fill{height:4px;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.gcard-pct{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px;}

/* GROUP DETAIL PAGE */
.group-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;}
.group-detail-back{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.group-detail-back:hover{color:var(--text);}
.group-detail-title{font-size:18px;font-weight:800;flex:1;}
.group-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(max-width:600px){.group-metrics{grid-template-columns:repeat(2,1fr);}}

.footer{text-align:right;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1.2rem;opacity:.6;}
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:inline-block;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-val{height:32px;width:80px;}
.skel-delta{height:12px;width:120px;margin-top:6px;}
.skel-chart{width:100%;height:220px;border-radius:8px;}
.skel-card{height:120px;border-radius:12px;width:100%;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">SendFlow Dashboard</div>
      <div class="brand-campaign" id="lbl-campaign">carregando...</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-txt">conectando...</span>
    </div>
    <button class="btn btn-accent" id="btn-refresh" onclick="loadData()" disabled>↻ atualizar</button>
  </div>
</div>

<div class="tabs-nav" id="tabs-nav">
  <button class="tab-btn active" onclick="showTab('visao-geral')" id="tab-visao-geral">Visão Geral</button>
</div>

<div class="main" id="main">
  <div class="loading-state">
    <div class="loading-icon">📡</div>
    <div class="loading-txt">buscando dados da campanha...</div>
  </div>
</div>

<script>
const COLORS = ['#00c988','#6a5fd6','#d4901f','#e04444','#38bdf8','#fb7185','#a3e635','#e879f9',
                '#f97316','#8b5cf6','#06b6d4','#84cc16','#ec4899','#14b8a6','#f59e0b','#6366f1'];
const ADMINS = 5;
let chartAnalytics = null;
let groupCharts = {};
let cachedGroups = [], cachedAnalytics = null, cachedLimit = 256;
let activeTab = 'visao-geral';

function setStatus(cls, txt){
  const p = document.getElementById('status-pill');
  p.className = 'status-pill'+(cls?' '+cls:'');
  document.getElementById('status-txt').textContent = txt;
}

function showTab(id){
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-'+id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-'+id));
}

async function loadData(){
  document.getElementById('btn-refresh').disabled = true;
  setStatus('','atualizando...');
  try {
    const res = await fetch('/api/data');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const { campaign, groups, analytics } = await res.json();
    cachedGroups = groups;
    cachedAnalytics = analytics;
    cachedLimit = campaign?.group?.limit || 256;
    renderDashboard(campaign, groups, analytics);
    setStatus('ok','atualizado');
  } catch(e){
    setStatus('err','erro');
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Não foi possível carregar os dados</div>
        <div class="error-sub">Verifique se a variável SENDFLOW_API_KEY está configurada no Vercel.</div>
      </div>`;
    console.error(e);
  } finally {
    document.getElementById('btn-refresh').disabled = false;
  }
}

function membros(g){ return Math.max(0, (g.participantsAmount||0) - ADMINS); }

function renderDashboard(campaign, groups, analytics){
  document.getElementById('lbl-campaign').textContent = campaign?.name || 'Campanha SendFlow';
  const limit = campaign?.group?.limit || 256;
  const sorted = [...groups].sort((a,b) => extractNum(a.name) - extractNum(b.name));

  const total = sorted.reduce((s,g) => s + membros(g), 0);
  const full  = sorted.filter(g => g.full).length;
  const media = sorted.length ? Math.round(total / sorted.length) : 0;
  let novosHoje = 0;
  if(analytics?.add?.dates){
    const dates = Object.entries(analytics.add.dates).sort((a,b) => a[0].localeCompare(b[0]));
    if(dates.length) novosHoje = dates[dates.length-1][1];
  }

  // Build tabs nav
  const nav = document.getElementById('tabs-nav');
  nav.innerHTML = `<button class="tab-btn ${activeTab==='visao-geral'?'active':''}" onclick="showTab('visao-geral')" id="tab-visao-geral">Visão Geral</button>`;
  sorted.forEach(g => {
    const num = extractNum(g.name);
    const id = 'grupo-'+g.id;
    nav.innerHTML += `<button class="tab-btn ${activeTab===id?'active':''}" onclick="showTab('${id}')" id="tab-${id}">#${num}</button>`;
  });

  // Build main content
  const main = document.getElementById('main');
  let html = `
  <div class="tab-panel ${activeTab==='visao-geral'?'active':''}" id="panel-visao-geral">
    <div class="metrics">
      <div class="mcard c1"><div class="mcard-label">total de membros</div><div class="mcard-val" id="m-total">${fmtN(total)}</div><div class="mcard-delta">${analytics?.add?.total?fmtN(analytics.add.total)+' entradas no total':''}</div></div>
      <div class="mcard c2"><div class="mcard-label">grupos ativos</div><div class="mcard-val">${sorted.length}</div><div class="mcard-delta">${full} grupo(s) cheio(s)</div></div>
      <div class="mcard c3"><div class="mcard-label">novos hoje</div><div class="mcard-val">+${fmtN(novosHoje)}</div><div class="mcard-delta">novos membros hoje</div></div>
      <div class="mcard c4"><div class="mcard-label">média por grupo</div><div class="mcard-val">${fmtN(media)}</div><div class="mcard-delta">membros por grupo</div></div>
    </div>
    <div id="chart-analytics-wrap" class="chart-card" style="display:none">
      <div class="chart-header">
        <div><div class="chart-title">Entradas e saídas diárias</div><div class="chart-sub">evolução de membros por dia na campanha</div></div>
        <div class="legend"><span class="legend-item"><span class="legend-sq" style="background:#00c988"></span>entradas</span><span class="legend-item"><span class="legend-sq" style="background:#e04444"></span>saídas</span></div>
      </div>
      <div style="position:relative;height:220px;"><canvas id="chart-analytics"></canvas></div>
    </div>
    <div class="section-label">detalhes por grupo</div>
    <div class="group-grid">
      ${sorted.map((g,i) => {
        const m = membros(g);
        const cap = Math.max(0, limit - ADMINS);
        const pct = cap ? Math.min(100, Math.round(m/cap*100)) : 0;
        const color = COLORS[i%COLORS.length];
        const num = extractNum(g.name);
        let badgeCls, badgeTxt;
        if(g.full||pct>=100){badgeCls='badge-full';badgeTxt='lotado';}
        else if(pct>=90){badgeCls='badge-warn';badgeTxt='quase cheio';}
        else{badgeCls='badge-ok';badgeTxt='ativo';}
        return `<div class="gcard" onclick="showTab('grupo-${g.id}')">
          <div class="gcard-top"><div class="gcard-name">#${num} — ${esc(g.name.replace(/.*#\d+\s*[—-]?\s*/,'').trim()||g.name)}</div><span class="gcard-badge ${badgeCls}">${badgeTxt}</span></div>
          <div class="gcard-numbers">
            <div class="gcard-num"><label>membros</label><span style="color:${color}">${fmtN(m)}</span></div>
            <div class="gcard-num"><label>capacidade</label><span>${fmtN(cap)}</span></div>
          </div>
          <div class="gcard-bar-track"><div class="gcard-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="gcard-pct">${pct}% da capacidade utilizada</div>
        </div>`;
      }).join('')}
    </div>
    <div class="footer" id="footer-ts">última atualização: ${new Date().toLocaleString('pt-BR')}</div>
  </div>`;

  // Individual group panels
  sorted.forEach((g,i) => {
    const id = 'grupo-'+g.id;
    const m = membros(g);
    const cap = Math.max(0, limit - ADMINS);
    const pct = cap ? Math.min(100, Math.round(m/cap*100)) : 0;
    const color = COLORS[i%COLORS.length];
    const num = extractNum(g.name);
    let badgeCls, badgeTxt;
    if(g.full||pct>=100){badgeCls='badge-full';badgeTxt='Lotado';}
    else if(pct>=90){badgeCls='badge-warn';badgeTxt='Quase cheio';}
    else{badgeCls='badge-ok';badgeTxt='Ativo';}
    html += `
    <div class="tab-panel ${activeTab===id?'active':''}" id="panel-${id}">
      <div class="group-detail-header">
        <button class="group-detail-back" onclick="showTab('visao-geral')">← Voltar</button>
        <div class="group-detail-title">${esc(g.name)}</div>
        <span class="gcard-badge ${badgeCls}" style="font-size:12px;padding:4px 12px">${badgeTxt}</span>
      </div>
      <div class="group-metrics">
        <div class="mcard c1"><div class="mcard-label">membros</div><div class="mcard-val" style="color:${color}">${fmtN(m)}</div><div class="mcard-delta">admins não contabilizados</div></div>
        <div class="mcard c2"><div class="mcard-label">capacidade</div><div class="mcard-val">${fmtN(cap)}</div><div class="mcard-delta">${pct}% utilizado</div></div>
        <div class="mcard c3"><div class="mcard-label">vagas restantes</div><div class="mcard-val">${fmtN(Math.max(0,cap-m))}</div><div class="mcard-delta">disponíveis</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div><div class="chart-title">Ocupação do grupo</div><div class="chart-sub">membros vs capacidade total</div></div>
        </div>
        <div style="position:relative;height:160px;"><canvas id="chart-g-${g.id}"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="mcard-label" style="margin-bottom:.8rem">BARRA DE CAPACIDADE</div>
        <div style="background:var(--surface2);border-radius:20px;height:12px;">
          <div style="width:${pct}%;height:12px;border-radius:20px;background:${color};transition:width .8s ease;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:6px;">
          <span>${fmtN(m)} membros</span><span>${pct}%</span><span>${fmtN(cap)} capacidade</span>
        </div>
      </div>
    </div>`;
  });

  main.innerHTML = html;

  // Render analytics chart
  if(analytics) renderAnalyticsChart(analytics);

  // Render individual doughnut charts
  sorted.forEach((g,i) => {
    const m = membros(g);
    const cap = Math.max(0, limit - ADMINS);
    const color = COLORS[i%COLORS.length];
    const ctx = document.getElementById('chart-g-'+g.id);
    if(!ctx) return;
    if(groupCharts[g.id]) groupCharts[g.id].destroy();
    groupCharts[g.id] = new Chart(ctx,{
      type:'doughnut',
      data:{
        labels:['Membros','Vagas disponíveis'],
        datasets:[{data:[m, Math.max(0,cap-m)], backgroundColor:[color,'rgba(255,255,255,0.05)'], borderWidth:0, hoverOffset:4}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',
        plugins:{legend:{display:true,position:'right',labels:{color:'#4a5060',font:{family:'DM Mono',size:11}}},
          tooltip:{callbacks:{label:c=>' '+fmtN(c.parsed)+' pessoas'}}}}
    });
  });
}

function renderAnalyticsChart(analytics){
  const wrap = document.getElementById('chart-analytics-wrap');
  if(!wrap) return;
  const allDates = new Set([...Object.keys(analytics.add?.dates||{}),...Object.keys(analytics.remove?.dates||{})]);
  const sorted = [...allDates].sort();
  if(!sorted.length){ return; }
  wrap.style.display = 'block';
  const labels  = sorted.map(d => `${d.slice(0,2)}/${d.slice(2,4)}`);
  const adds    = sorted.map(d => analytics.add?.dates?.[d]    || 0);
  const removes = sorted.map(d => analytics.remove?.dates?.[d] || 0);
  if(chartAnalytics) chartAnalytics.destroy();
  chartAnalytics = new Chart(document.getElementById('chart-analytics'),{
    type:'bar',
    data:{labels, datasets:[
      {label:'Entradas', data:adds,    backgroundColor:'rgba(0,201,136,.7)', borderRadius:4},
      {label:'Saídas',   data:removes, backgroundColor:'rgba(224,68,68,.5)', borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#4a5060',font:{family:'DM Mono',size:11}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#4a5060',font:{family:'DM Mono',size:11},callback:v=>fmtN(v)},grid:{color:'rgba(255,255,255,.04)'}}
      }}
  });
}

function extractNum(name){
  const m = String(name||'').match(/#(\d+)/);
  return m ? parseInt(m[1]) : 999;
}
function fmtN(n){ return Number(n).toLocaleString('pt-BR'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
</script>
</body>
</html>
