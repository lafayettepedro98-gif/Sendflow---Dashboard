<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mentoría Inglés en 90 Horas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050608;--surface:#0c0d11;--surface2:#111318;
  --border:rgba(255,255,255,0.05);--text:#d8dce8;--muted:#4a5060;
  --accent:#00c988;--accent2:#6a5fd6;--accent3:#d4901f;--danger:#e04444;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(0,201,136,.5);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
.brand-name{font-size:15px;font-weight:800;}
.brand-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.status-pill{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:11px;font-family:var(--mono);color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.status-pill.ok{color:var(--accent);border-color:rgba(0,201,136,.25);}
.status-pill.ok .status-dot{background:var(--accent);}
.status-pill.err{color:var(--danger);border-color:rgba(224,68,68,.25);}
.status-pill.err .status-dot{background:var(--danger);}
.status-pill.warn{color:var(--accent3);border-color:rgba(212,144,31,.25);}
.status-pill.warn .status-dot{background:var(--accent3);}
.btn{padding:7px 16px;border-radius:7px;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-accent{background:var(--accent);color:#050608;}
.btn-accent:hover{filter:brightness(.88);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:6rem 2rem;max-width:480px;margin:0 auto;}
.empty-icon{font-size:48px;margin-bottom:1rem;}
.empty-title{font-size:20px;font-weight:800;margin-bottom:.5rem;}
.empty-sub{font-size:13px;color:var(--muted);font-family:var(--mono);line-height:1.7;margin-bottom:1.5rem;}
.empty-url{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;font-family:var(--mono);font-size:13px;color:var(--accent);word-break:break-all;}

.main{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem;}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem;}
.metrics-row2{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(max-width:700px){.metrics-row,.metrics-row2{grid-template-columns:repeat(2,1fr);}}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;position:relative;overflow:hidden;}
.mcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mcard.c1::after{background:linear-gradient(90deg,var(--accent),transparent);}
.mcard.c2::after{background:linear-gradient(90deg,var(--accent2),transparent);}
.mcard.c3::after{background:linear-gradient(90deg,var(--accent3),transparent);}
.mcard.c4::after{background:linear-gradient(90deg,var(--danger),transparent);}
.mcard.c5::after{background:linear-gradient(90deg,#38bdf8,transparent);}
.mcard.c6::after{background:linear-gradient(90deg,#a3e635,transparent);}
.mcard.c7::after{background:linear-gradient(90deg,#e879f9,transparent);}
.mcard-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.5rem;}
.mcard-val{font-size:26px;font-weight:800;line-height:1;}
.mcard-delta{font-size:11px;margin-top:.4rem;font-family:var(--mono);color:var(--muted);}
.mcard-delta.up{color:var(--accent);}
.mcard-delta.dn{color:var(--danger);}

/* CHART */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1rem;}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.1rem;}
.chart-title{font-size:14px;font-weight:700;}
.chart-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted);font-family:var(--mono);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-sq{width:10px;height:10px;border-radius:2px;}

/* REALTIME FEED */
.feed-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1rem;}
.feed-title{font-size:13px;font-weight:700;margin-bottom:.8rem;display:flex;align-items:center;gap:8px;}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite;}
.feed-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.feed-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:var(--surface2);font-size:12px;}
.feed-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:20px;white-space:nowrap;}
.feed-in{background:rgba(0,201,136,.12);color:var(--accent);}
.feed-out{background:rgba(224,68,68,.12);color:var(--danger);}
.feed-time{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:auto;}
.feed-empty{font-size:12px;color:var(--muted);font-family:var(--mono);text-align:center;padding:1rem;}

.footer{text-align:right;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1.2rem;opacity:.6;}
.section-label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:.8rem;margin-top:.5rem;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">SendFlow Dashboard</div>
      <div class="brand-sub" id="lbl-sub">Mentoría Inglés en 90 Horas</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-txt">conectando...</span>
    </div>
    <button class="btn btn-accent" id="btn-refresh" onclick="loadData()" disabled>↻ atualizar</button>
  </div>
</div>

<div class="main" id="main">
  <div style="text-align:center;padding:4rem 0;color:var(--muted);font-family:var(--mono);font-size:13px;">
    📡 buscando dados...
  </div>
</div>

<script>
let chartHistory = null, chartClicks = null;

function setStatus(cls, txt){
  const p = document.getElementById('status-pill');
  p.className = 'status-pill'+(cls?' '+cls:'');
  document.getElementById('status-txt').textContent = txt;
}

async function loadData(){
  document.getElementById('btn-refresh').disabled = true;
  setStatus('','atualizando...');
  try {
    const res = await fetch('/api/data');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if(!data.hasData){
      renderEmpty();
      setStatus('warn','aguardando dados');
    } else {
      renderDashboard(data);
      setStatus('ok','atualizado');
    }
  } catch(e){
    setStatus('err','erro');
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:4rem;border:1px dashed rgba(224,68,68,.3);border-radius:14px;margin-top:1rem;">
        <div style="font-size:32px;margin-bottom:1rem;">⚠️</div>
        <div style="font-size:15px;font-weight:700;color:var(--danger);margin-bottom:.5rem;">Erro ao carregar dados</div>
        <div style="font-size:12px;color:var(--muted);font-family:var(--mono);">${e.message}</div>
      </div>`;
    console.error(e);
  } finally {
    document.getElementById('btn-refresh').disabled = false;
  }
}

function renderEmpty(){
  document.getElementById('main').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔗</div>
      <div class="empty-title">Aguardando primeiro envio</div>
      <div class="empty-sub">
        O dashboard está pronto! Agora configure o webhook no SendFlow apontando para a URL abaixo.
        Quando o primeiro dado chegar, as métricas aparecerão automaticamente.
      </div>
      <div class="empty-url" id="webhook-url">carregando url...</div>
      <div style="margin-top:1rem;font-size:11px;color:var(--muted);font-family:var(--mono);">
        Os dados chegam em tempo real para entradas/saídas<br>
        e 3x por dia (7h, 12h, 17h) para métricas gerais.
      </div>
    </div>`;
  document.getElementById('webhook-url').textContent = window.location.origin + '/api/webhook';
}

function renderDashboard(data){
  const l = data.latest || {};
  const ADMINS = 5;
  const participants = Math.max(0, (l.participants_amount||0) - ADMINS);
  const capacity     = Math.max(0, (l.groups_total||0) * 251); // 256 - 5 admins

  // Histórico por dia para gráficos
  const byDay = {};
  (data.history||[]).forEach(s => {
    const d = new Date(s.created_at);
    const key = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byDay[key]) byDay[key] = { input:0, output:0, clicks:0, participants:0 };
    byDay[key].input    = Math.max(byDay[key].input,    s.input_amount||0);
    byDay[key].output   = Math.max(byDay[key].output,   s.output_amount||0);
    byDay[key].clicks   = Math.max(byDay[key].clicks,   s.clicks_total||0);
    byDay[key].participants = Math.max(byDay[key].participants, (s.participants_amount||0)-ADMINS);
  });
  const days    = Object.keys(byDay).slice(-14);
  const inputs  = days.map(d => byDay[d].input);
  const outputs = days.map(d => byDay[d].output);
  const clicks  = days.map(d => byDay[d].clicks);
  const parts   = days.map(d => byDay[d].participants);

  document.getElementById('main').innerHTML = `
  <div class="metrics-row">
    <div class="mcard c1">
      <div class="mcard-label">participantes</div>
      <div class="mcard-val">${fmtN(participants)}</div>
      <div class="mcard-delta">admins não contabilizados</div>
    </div>
    <div class="mcard c2">
      <div class="mcard-label">entradas totais</div>
      <div class="mcard-val">${fmtN(l.input_amount||0)}</div>
      <div class="mcard-delta up">▲ ${fmtN(data.inputsHoje||0)} hoje</div>
    </div>
    <div class="mcard c4">
      <div class="mcard-label">saídas totais</div>
      <div class="mcard-val">${fmtN(l.output_amount||0)}</div>
      <div class="mcard-delta dn">▼ ${fmtN(data.outputsHoje||0)} hoje</div>
    </div>
    <div class="mcard c5">
      <div class="mcard-label">cliques totais</div>
      <div class="mcard-val">${fmtN(l.clicks_total||0)}</div>
      <div class="mcard-delta">em links de convite</div>
    </div>
  </div>
  <div class="metrics-row2">
    <div class="mcard c3">
      <div class="mcard-label">grupos totais</div>
      <div class="mcard-val">${fmtN(l.groups_total||0)}</div>
      <div class="mcard-delta">grupos na campanha</div>
    </div>
    <div class="mcard c6">
      <div class="mcard-label">grupos abertos</div>
      <div class="mcard-val">${fmtN(l.groups_open||0)}</div>
      <div class="mcard-delta">com vagas disponíveis</div>
    </div>
    <div class="mcard c7">
      <div class="mcard-label">grupos cheios</div>
      <div class="mcard-val">${fmtN(l.groups_full||0)}</div>
      <div class="mcard-delta">sem vagas</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Entradas e saídas diárias</div>
        <div class="chart-sub">evolução nos últimos 14 dias</div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-sq" style="background:#00c988"></span>entradas</span>
        <span class="legend-item"><span class="legend-sq" style="background:#e04444"></span>saídas</span>
      </div>
    </div>
    <div style="position:relative;height:220px;"><canvas id="chart-history"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Crescimento de participantes</div>
        <div class="chart-sub">total de membros por dia (sem admins)</div>
      </div>
    </div>
    <div style="position:relative;height:180px;"><canvas id="chart-parts"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">Cliques nos convites</div>
        <div class="chart-sub">total acumulado por dia</div>
      </div>
    </div>
    <div style="position:relative;height:160px;"><canvas id="chart-clicks"></canvas></div>
  </div>

  <div class="feed-card">
    <div class="feed-title">
      <div class="feed-dot"></div>
      Eventos em tempo real — últimas 24h
    </div>
    <div class="feed-list" id="feed-list">
      ${(data.history||[]).length === 0
        ? '<div class="feed-empty">Nenhum evento nas últimas 24h</div>'
        : ''}
    </div>
  </div>

  <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:.5rem;">
    URL do webhook: <strong style="color:var(--accent)">${window.location.origin}/api/webhook</strong>
  </div>
  <div class="footer" id="footer-ts">última atualização: ${new Date().toLocaleString('pt-BR')}</div>`;

  // Render charts
  const chartOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:'#4a5060',font:{family:'DM Mono',size:10}},grid:{color:'rgba(255,255,255,.03)'}},
      y:{ticks:{color:'#4a5060',font:{family:'DM Mono',size:10},callback:v=>fmtN(v)},grid:{color:'rgba(255,255,255,.03)'}}
    }
  };

  if(chartHistory) chartHistory.destroy();
  chartHistory = new Chart(document.getElementById('chart-history'),{
    type:'bar',
    data:{labels:days, datasets:[
      {label:'Entradas', data:inputs,  backgroundColor:'rgba(0,201,136,.7)', borderRadius:3},
      {label:'Saídas',   data:outputs, backgroundColor:'rgba(224,68,68,.5)', borderRadius:3},
    ]},
    options:{...chartOpts}
  });

  if(chartClicks) chartClicks.destroy();
  chartClicks = new Chart(document.getElementById('chart-clicks'),{
    type:'line',
    data:{labels:days, datasets:[{
      label:'Cliques', data:clicks,
      borderColor:'#38bdf8', backgroundColor:'rgba(56,189,248,.08)',
      borderWidth:2, pointRadius:3, fill:true, tension:.4
    }]},
    options:{...chartOpts}
  });

  // Participantes chart
  new Chart(document.getElementById('chart-parts'),{
    type:'line',
    data:{labels:days, datasets:[{
      label:'Participantes', data:parts,
      borderColor:'#00c988', backgroundColor:'rgba(0,201,136,.08)',
      borderWidth:2, pointRadius:3, fill:true, tension:.4
    }]},
    options:{...chartOpts}
  });
}

function fmtN(n){ return Number(n||0).toLocaleString('pt-BR'); }

loadData();
</script>
</body>
</html>
